version: "3.9"

services:
  
  frontend:
    image: suryasuraj/march-ui
    ports:
      - "8888:80"
    depends_on:
      - backend
    container_name: frontend
 

  backend:
    image: suryasuraj/march-backend
    ports:
      - "7000:7000"
    env_file:
      - "./server/envtxt"
    container_name: backend

