version: "3.9"

services:
  frontend:
    image: suryasuraj/march-ui:latest
    # build:
    #   context: ./client
    ports:
      - "8888:80"
    environment:
      - REACT_APP_API_BASE=http://backend:7000
    depends_on:
      - backend
    container_name: frontend

  backend:
    image: suryasuraj/march-backend:latest
    # build: 
    #   context: ./server
    ports:
      - "7000:7000"
    env_file:
      - "./server/.env"
    container_name: backend